name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet publish Jellyfin.Plugin.HDHomeRunGuide/Jellyfin.Plugin.HDHomeRunGuide.csproj --configuration Release --output ./publish

      - name: Zip artifact
        run: zip -j jellyfin-hdhomerun-guide.zip ./publish/Jellyfin.Plugin.HDHomeRunGuide.dll

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: jellyfin-hdhomerun-guide.zip
